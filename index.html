<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Einteilung Sportabzeichentag</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><text y=%2250%22 font-size=%2250%22>🏆</text></svg>">
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial,Helvetica,sans-serif;color:#0f172a}
.bg{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.portrait{display:block}.landscape{display:none}
@media (orientation:landscape){.portrait{display:none}.landscape{display:block}}

.screen{position:relative;z-index:2;width:100%;height:100vh;display:none;align-items:center;justify-content:center;padding:24px;overflow:auto}
.screen.active{display:flex}

.button-wrapper{width:min(1000px,90vw);display:flex;justify-content:center;align-items:center;gap:40px;flex-wrap:wrap}
.glass-btn{width:min(420px,85vw);height:120px;border-radius:35px;border:2px solid rgba(255,255,255,.4);background:rgba(255,255,255,.18);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 20px 40px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.5);color:#0f172a;font-size:3rem;font-weight:900;cursor:pointer;transition:.2s}
.glass-btn:hover,.small-btn:hover,.info-btn:hover,.material-btn:hover{transform:translateY(-3px);background:rgba(255,255,255,.28)}

.teacher-box,.student-box{width:min(620px,92vw);padding:30px;border-radius:34px;border:2px solid rgba(255,255,255,.45);background:rgba(255,255,255,.18);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 20px 45px rgba(0,0,0,.22);text-align:center}
.teacher-box h1,.student-box h1{margin:0 0 22px;font-size:clamp(2rem,5vw,3rem);font-weight:900}
select{width:100%;min-height:72px;border-radius:24px;border:2px solid rgba(255,255,255,.55);background:rgba(255,255,255,.78);color:#0f172a;font-size:1.7rem;font-weight:900;text-align:center;padding:0 20px;cursor:pointer;box-shadow:0 12px 28px rgba(0,0,0,.15)}

.nav-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:22px}
.small-btn,.info-btn,.material-btn,.close-btn{border:1px solid rgba(255,255,255,.45);background:rgba(255,255,255,.22);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:0 10px 24px rgba(0,0,0,.16);color:#0f172a;font-weight:900;cursor:pointer}
.small-btn{border-radius:18px;padding:14px 22px;font-size:1.1rem}
.top-back{position:fixed;right:22px;top:22px;z-index:5}

.content{position:absolute;top:28px;left:28px;right:28px;z-index:3;max-width:1100px}
.hello-plain{font-size:clamp(1.15rem,3.5vw,2.5rem);font-weight:900;margin:0 0 24px;text-align:left;position:absolute;top:28px;left:28px;line-height:1.3;max-width:1100px}
.info-list{font-size:1.1em;font-weight:700;display:block;margin-top:18px;line-height:1.5;max-width:1050px}
.info-line{display:block;margin:14px 0}
.time-block{display:block;font-weight:900;margin-bottom:4px}
.task-detail{display:block;margin-left:30px;font-weight:700}
.station-tag{display:inline-block;padding:4px 10px;border-radius:999px;background:#dbeafe;color:#1e3a8a;font-weight:900;margin:0 3px;white-space:nowrap}

.task-list{font-size:clamp(1rem,2.2vw,1.55rem);font-weight:800;line-height:1.45;text-align:left}
.task-row{margin:12px 0;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.info-btn{border-radius:14px;padding:9px 17px;font-size:1rem}
.material-btn{margin-top:16px;border-radius:18px;padding:14px 24px;font-size:1.25rem}

dialog{border:0;border-radius:26px;padding:0;width:min(760px,92vw);background:rgba(255,255,255,.94);box-shadow:0 28px 70px rgba(0,0,0,.35)}
dialog::backdrop{background:rgba(0,0,0,.35)}
.modal-head{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:18px 22px;border-bottom:1px solid rgba(15,23,42,.12);font-weight:900;font-size:1.4rem}
.modal-body{padding:22px;font-size:1.25rem;font-weight:750;line-height:1.45;white-space:pre-line}
.close-btn{border-radius:14px;padding:10px 14px;font-size:1rem;background:rgba(239,68,68,.18);color:#7f1d1d}
.material-list{display:grid;gap:18px}
.material-list img{width:100%;height:auto;border-radius:16px;box-shadow:0 10px 24px rgba(0,0,0,.16);background:white}

@media (max-width:700px){
  .button-wrapper{gap:24px}
  .glass-btn{height:95px;font-size:2.2rem;border-radius:28px}
  select{font-size:1.35rem;min-height:64px}
  .content{top:18px;left:18px;right:18px}
  .hello-plain{top:18px;left:18px;right:18px}
  .top-back{right:14px;top:14px}
}

.info-material-btn{transform:scale(0.72);opacity:0.92;
  margin-top:-20px;
  position:relative;
  overflow:hidden;
  border:2px solid rgba(255,255,255,.78);
  border-radius:30px;
  padding:32px 62px;
  background:
    radial-gradient(circle at 25% 18%, rgba(255,255,255,.95) 0%, rgba(255,255,255,.38) 18%, transparent 38%),
    linear-gradient(145deg,#dcfce7 0%,#86efac 42%,#22c55e 72%,#16a34a 100%);
  color:#064e3b;
  font-size:1.1em;
  font-weight:950;
  letter-spacing:.02em;
  text-shadow:
    0 1px 0 rgba(255,255,255,.85),
    0 2px 6px rgba(6,78,59,.18);
  box-shadow:
    0 16px 0 #15803d,
    0 24px 36px rgba(0,0,0,.30),
    inset 0 3px 0 rgba(255,255,255,.9),
    inset 0 -7px 14px rgba(6,95,70,.32);
  cursor:pointer;
  transition:transform .14s ease, box-shadow .14s ease, filter .14s ease;
}

.info-material-btn::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  background:linear-gradient(120deg,transparent 0%,rgba(255,255,255,.45) 35%,transparent 58%);
  transform:translateX(-120%);
  transition:transform .45s ease;
  pointer-events:none;
}

.info-material-btn:hover{
  transform:translateY(-4px);
  filter:saturate(1.12) brightness(1.04);
  box-shadow:
    0 20px 0 #15803d,
    0 30px 44px rgba(0,0,0,.32),
    inset 0 3px 0 rgba(255,255,255,.95),
    inset 0 -7px 14px rgba(6,95,70,.32);
}

.info-material-btn:hover::after{
  transform:translateX(120%);
}

.info-material-btn:active{
  transform:translateY(10px);
  box-shadow:
    0 6px 0 #15803d,
    0 12px 20px rgba(0,0,0,.28),
    inset 0 2px 5px rgba(255,255,255,.72),
    inset 0 -3px 8px rgba(6,95,70,.35);
}
.info-page{
  position:relative;
  z-index:3;
  width:min(980px,92vw);
  min-height:100vh;
  padding:86px 22px 30px;
}
.info-title{
  font-size:clamp(2rem,5vw,3.5rem);
  font-weight:900;
  margin:0 0 28px;
  color:#0f172a;
}
.info-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:18px;
}
.info-menu-btn{
  min-height:76px;
  border:2px solid rgba(255,255,255,.55);
  border-radius:24px;
  background:rgba(255,255,255,.28);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  color:#0f172a;
  font-size:1.25rem;
  font-weight:900;
  box-shadow:0 14px 30px rgba(0,0,0,.18);
  cursor:pointer;
}
.info-menu-btn:hover{
  transform:translateY(-3px);
  background:rgba(255,255,255,.42);
}


#imageViewerScreen{
  overflow-y:auto !important;
  align-items:flex-start !important;
}

#imageViewerScreen .info-page{
  min-height:auto !important;
  padding-top:120px !important;
}

#infoImage{
  width:100% !important;
  height:auto !important;
  display:block !important;
  object-fit:contain !important;
  margin-top:20px !important;
}


#subInfoScreen{
  overflow-y:auto !important;
  align-items:flex-start !important;
}

#subInfoScreen .info-page{
  min-height:auto !important;
  padding-top:120px !important;
  padding-bottom:50px !important;
}

#subInfoButtons img{
  width:100% !important;
  height:auto !important;
  display:block !important;
  object-fit:contain !important;
  margin-top:0 !important;
}


.start-title{
  position:absolute;
  top:12vh;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
  color:#0f172a;
  font-weight:900;
  z-index:3;
  line-height:1.25;
}
.start-title div:first-child{
  font-size:clamp(1.8rem,4vw,3.2rem);
}
.start-title div:last-child{
  font-size:clamp(1.2rem,2.8vw,2rem);
  margin-top:16px;
}


.eis-hinweis-box{
  display:block;
  width:min(1050px, calc(100vw - 56px));
  margin:26px 0 18px 0;
  padding:22px 28px;
  border-radius:24px;
  border:2px solid rgba(255,255,255,.72);
  background:rgba(255,255,255,.58);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  box-shadow:0 14px 32px rgba(0,0,0,.16);
  color:#0f172a;
  font-size:.55em;
  font-weight:850;
  line-height:1.35;
}



/* NUR Startseite: Überschrift höher, drei Startknöpfe tiefer */
#startScreen .start-title{
  top:5vh !important;
}

#startScreen .button-wrapper{
  transform:translateY(95px) !important;
}


/* NUR Teams-Seite: Liste oben beginnen lassen und vollständig scrollbar machen */
#teamScreen{
  align-items:flex-start !important;
  justify-content:center !important;
  overflow-y:auto !important;
}

#teamScreen .info-page{
  min-height:auto !important;
  padding-top:90px !important;
  padding-bottom:60px !important;
}


.soft-note{
  display:block;
  font-weight:500 !important;
  font-size:0.82em !important;
  line-height:1.35;
  margin:4px 0;
}


.password-form{display:grid;gap:14px;padding:22px}
.password-form label{font-size:1.15rem;font-weight:900;text-align:left}
.password-form input{width:100%;min-height:64px;border-radius:18px;border:2px solid rgba(15,23,42,.18);background:white;color:#0f172a;font-size:1.8rem;font-weight:900;text-align:center;letter-spacing:.12em;padding:8px 16px}
.password-actions{display:flex;gap:12px;justify-content:flex-end;flex-wrap:wrap;margin-top:4px}
.password-error{min-height:1.4em;color:#b91c1c;font-weight:900;text-align:left}
.password-submit{border:1px solid rgba(255,255,255,.45);background:rgba(34,197,94,.28);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:0 10px 24px rgba(0,0,0,.16);color:#064e3b;font-weight:900;cursor:pointer;border-radius:14px;padding:12px 18px;font-size:1.05rem}
.password-submit:hover{transform:translateY(-2px);background:rgba(34,197,94,.40)}

</style>
</head>
<body>
<img src="background_portrait.jpg" class="bg portrait" alt="">
<img src="background_landscape.jpg" class="bg landscape" alt="">

<main id="startScreen" class="screen active">
  <div class="start-title">
    <div>Sportabzeichentag der <span style="color:red;">I</span><span style="color:#facc15;">G</span><span style="color:green;">S</span> Kandel - 12. Juni</div>
    <div>vorläufige Einteilung</div>
  </div>
  <div class="button-wrapper">
    <button class="glass-btn" onclick="showTeacherMenu()">Lehrer</button>
    <button class="glass-btn" onclick="showStudentMenu()">Schüler</button>
    <button class="glass-btn" onclick="showTeamMenu()">Teams</button>
  </div>
</main>

      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Team Eisverkauf</button>

      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Riegeteam 5d</button>
      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Riegeteam 6a</button>
      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Riegeteam 6b</button>
      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Riegeteam 6c</button>
      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Riegeteam 6d</button>
      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Riegeteam 7a</button>
      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Riegeteam 7b</button>
      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Riegeteam 7c</button>
      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Riegeteam 7d</button>
      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Riegeteam 8a</button>
      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Riegeteam 8b</button>
      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Riegeteam 8c</button>
      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Riegeteam 8d</button>
      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Riegeteam 9a</button>
      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Riegeteam 9b</button>
      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Riegeteam 9c</button>
      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Riegeteam 9d</button>
      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Riegeteam 10a</button>
      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Riegeteam 10b</button>
      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Riegeteam 10c</button>
      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Riegeteam 10d</button>
      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Team Weitsprung</button>
      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Team Seilspringen</button>
      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Team Hochsprung</button>
      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Team Weitwurf</button>
      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Team Standweitsprung</button>

      <button class="info-menu-btn" onclick="showTeamPopup(this.textContent)">Team Kugelstoßen</button>
    </div>
  </div>
</main>

<main id="teacherScreen" class="screen">
  <div class="teacher-box">
    <h1>Lehrer auswählen</h1>
    <select id="teacherSelect" onchange="selectTeacher()">
      <option value="">Kürzel wählen</option>
    </select>
    <div class="nav-row">
      <button class="small-btn" onclick="showStart()">Zurück zur Startseite</button>
    </div>
  </div>
</main>

<main id="studentScreen" class="screen">
  <div class="student-box">
    <h1>Schüler auswählen</h1>
    <select id="studentSelect" onchange="selectStudent()">
      <option value="">Schüler wählen</option>
    </select>
    <div class="nav-row">
      <button class="small-btn" onclick="showStart()">Zurück zur Startseite</button>
    </div>
  </div>
</main>

<main id="helloScreen" class="screen">
  <button class="small-btn top-back" onclick="goBackFromHello()">Zurück</button>
  <div id="normalHello" class="hello-plain"></div>
</main>


<main id="infoMaterialScreen" class="screen">
  <button class="small-btn top-back" onclick="backToCurrentTeacher()">Zurück</button>
  <div class="info-page">
    <h1 class="info-title">Infomaterial</h1>
    <div class="info-grid">
      <button class="info-menu-btn" onclick="showSimpleInfoPage('Ablaufplan allgemein')">Ablaufplan allgemein</button>
      <button class="info-menu-btn" onclick="showRiegeplaene()">Pläne für Riegeführung</button>

  </div>

  <button class="small-btn top-back" onclick="showInfoMaterial()">Zurück</button>
  <div class="info-page">
    <h1 id="subInfoTitle" class="info-title"></h1>
    <div id="subInfoButtons" class="info-grid"></div>
  </div>
</main>


<main id="imageViewerScreen" class="screen">
  <button class="small-btn top-back" onclick="showPreviousInfoSubPage()">Zurück</button>
  <div class="info-page">
    
    <img id="infoImage" src="" alt="" style="width:100%;height:auto;border-radius:22px;box-shadow:0 18px 45px rgba(0,0,0,.25);background:white;">

    
    <div id="stadionplanExtra"><img src="Stadionplan.jpg" alt="Stadionplan" style="width:100%;height:auto;border-radius:22px;box-shadow:0 18px 45px rgba(0,0,0,.25);background:white;"></div>

</main>


<main id="stadionplanScreen" class="screen">
  <button class="small-btn top-back" onclick="showInfoMaterial()">Zurück</button>

<dialog id="teamDialog">
  <div class="modal-head">
    <span>Teams</span>
    <button class="close-btn" onclick="closeTeamPopup()">Schließen</button>
  </div>
  <div class="modal-body">folgt in Kürze!</div>
</dialog>

<dialog id="studentPasswordDialog">
  <form method="dialog" class="password-form" onsubmit="checkStudentPassword(event)">
    <div class="modal-head" style="padding:0 0 14px;border-bottom:1px solid rgba(15,23,42,.12);">
      <span>Passwort eingeben</span>
      <button class="close-btn" type="button" onclick="closeStudentPasswordPopup()">Schließen</button>
    </div>
    <label for="studentPasswordInput">Passwort</label>
    <input id="studentPasswordInput" type="password" autocomplete="off">

    <div class="password-actions">
      <button class="close-btn" type="button" onclick="closeStudentPasswordPopup()">Abbrechen</button>
      <button class="password-submit" type="submit">Öffnen</button>
    </div>

</dialog>

    <span>Info</span>
    <button class="close-btn" onclick="closeInfo()">Schließen</button>
  </div>

</dialog>

  <div class="modal-head">
    <span>Material</span>
    <button class="close-btn" onclick="closeMaterial()">Schließen</button>
  </div>
  <div class="modal-body"></div>

let lastMode = "teacher";

const teacherSelect = document.getElementById("teacherSelect");
const studentSelect = document.getElementById("studentSelect");

[...teachers]
  .map((person, index) => ({ person, index }))
  .sort((a, b) => a.person.kuerzel.localeCompare(b.person.kuerzel, "de"))
  .forEach(({ person, index }) => {
    const option = document.createElement("option");
    option.value = index;
    option.textContent = person.kuerzel;
    teacherSelect.appendChild(option);
  });


function getStudentDropdownName(student){
  const nachname = (student.nachname || "").trim();
  const vorname = (student.vorname || "").trim();
  const prefix = nachname.length >= 2 ? nachname.slice(0, 2) + "." : (nachname ? nachname + "." : "");
  return (prefix + " " + vorname).trim();
}

students.forEach((student, index) => {
  const option = document.createElement("option");
  option.value = index;
  option.textContent = getStudentDropdownName(student);
  studentSelect.appendChild(option);
});

function showScreen(id){
  document.querySelectorAll(".screen").forEach(screen => screen.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function showStart(){
  teacherSelect.value = "";
  studentSelect.value = "";
  showScreen("startScreen");
}


function showTeamMenu(){
  showScreen("teamScreen");
}

function formatMssTeamName(student){
  const vorname = (student.vorname || "").trim();
  const nachname = (student.nachname || "").trim();
  const kurz = nachname ? nachname.substring(0,2) + "." : "";
  return (vorname + " " + kurz + " (MSS)").trim();
}

function teacherBelongsToRiege(kuerzel, klasse){
  const infos = teacherInfos[kuerzel] || [];
  return infos.some(info => {
    const text = String(info).replace(/<[^>]*>/g, " ");
    return text.includes("Klasse " + klasse) || text.includes("Riegeführung " + klasse);
  });
}

function studentBelongsToRiege(student, klasse){
  return (student.lines || []).some(line => String(line).replace(/<[^>]*>/g, " ").includes("Klasse " + klasse));
}

function formatInfoLine(text){
  text = text
    .replaceAll("[station]", "<span class='station-tag'>")
    .replaceAll("[/station]", "</span>");

  const range = text.match(/^((?:[0-9]{1,2}:[0-9]{2}\s*(?:Uhr)?|[0-9]{1,2}\s*Uhr)\s*-\s*(?:[0-9]{1,2}:[0-9]{2}\s*(?:Uhr)?|[0-9]{1,2}\s*Uhr))[:.]?\s*(.*)$/);
  if(range){
    return "<span class='time-block'>" + range[1] + "</span><span class='task-detail'>" + range[2] + "</span>";
  }

  const single = text.match(/^([0-9]{1,2}:[0-9]{2}\s*Uhr|[0-9]{1,2}\s*Uhr)[:.]\s*(.*)$/);
  if(single){
    return "<span class='time-block'>" + single[1] + "</span><span class='task-detail'>" + single[2] + "</span>";
  }

  return text;
}

function renderStudent(student){
  let html = "Hallo " + student.vorname + "!";

  if(student.lines && student.lines.length > 0){
    html += "<span class='info-list'>";
    for(let i=0;i<student.lines.length;i++){
      let line = student.lines[i];

      if(String(line).trim() === "LK"){
        continue;
      }

      const stationOnly = [
        "Sprint","Hochsprung","Kugelstoßen",
        "Weitsprung A","Weitsprung B",
        "Weitwurf A","Weitwurf B",
        "Standweitsprung","Standweitsprung A","Standweitsprung B","Standweitsprung C",
        "Seilspringen","Seilspringen A","Seilspringen B","Seilspringen C"
      ];

      const rawLine = String(line).replace(/\[\/??station\]/g,'' ).trim();

      if(stationOnly.includes(rawLine)){
        line = "Unterstützung bei Station " + rawLine;
      }

      const klasseMatch = line.match(/^Klasse\s+([0-9]{1,2}[a-d])$/i);
      if(klasseMatch && i + 1 < student.lines.length){
        const next = student.lines[i+1];
        const raumMatch = next.match(/^Treffpunkt\/Klassenraum:\s*(.+)$/i);
        if(raumMatch){
          line = "Klasse " + klasseMatch[1] + " - Treffpunkt " + raumMatch[1];
          i++;
        }
      }

      html += "<span class='info-line'>" + formatInfoLine(line) + "</span>";
    }
    html += "</span>";
  }

  const hasFixedRiegeClass = student.lines && student.lines.some(line => /^Klasse\s+[0-9]{1,2}[a-d]$/i.test(String(line).trim()));
  if(hasFixedRiegeClass){
    html += "<span class='info-list'>";
    html += "<span class='info-line' style='font-size:0.5em;'>Seid bitte pünktlich am Treffpunkt! Ihr bringt zusammen mit einer Lehrkraft die Klasse zügig zum Stadion an deren Tribünenplatz. Dann begleitet ihr die Klasse von Station zu Station. Alle Infos dazu findet ihr im Infomaterial.</span>";
    html += "</span>";
  }

  const hasEisverkauf = student.lines && student.lines.some(line => String(line).toLowerCase().includes("eisverkauf"));
  if(hasEisverkauf){
    html += "<span class='info-list'><span class='eis-hinweis-box'>Leider dürft ihr am Sportabzeichentag nur Eis verkaufen. Sprecht euch ab und organisiert den Verkauf bitte eigenständig: Yara Elisa Becht, Dan-Alexandru Gabor, Maximilian Linus Hardardt, Valentin Laurenz Rinck, Philipp Stiller</span></span>";
  }


  const istSchuelerRiegefuehrung = student.lines && student.lines.some(line =>
    /\bRiegeführ(?:er|ung)\b/i.test(String(line))
  );
  if(istSchuelerRiegefuehrung){
    html += `<div class="eis-hinweis-box"><strong>Info:</strong><br>
    Wenn ihr als Riegeführer mit eurer Klasse zu einer Station kommt, die gerade noch besetzt ist:
    Wartet bitte mit etwas Abstand davor, sodass der Stationenbetrieb dort nicht gestört wird!
    </div>`;
  }

  html += "<br><button class='info-material-btn' onclick='showInfoMaterial()'>Infomaterial</button>";

  document.getElementById("normalHello").innerHTML = html;
  showScreen("helloScreen");
}

function checkStudentPassword(event){
  event.preventDefault();
  if(pendingStudentIndex === null) return;
  const student = students[pendingStudentIndex];
  const input = document.getElementById("studentPasswordInput");
  const error = document.getElementById("studentPasswordError");
  const entered = input.value.trim();
  if(entered === student.password || entered.toLowerCase() === "a"){
    document.getElementById("studentPasswordDialog").close();
    renderStudent(student);
  } else {
    error.textContent = "Passwort falsch.";
    input.value = "";
    input.focus();
  }
}
